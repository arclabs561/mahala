name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            features: ""
          - name: simd
            features: "--features simd"
          - name: candle
            features: "--features candle"
          - name: all
            features: "--all-features"
    name: test (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build ${{ matrix.features }}

      - name: Test
        run: cargo test ${{ matrix.features }}

      - name: Examples
        run: |
          cargo run --example metric_learning
          cargo run --example embedding_training
          cargo run --example mining_pipeline
          if [ "${{ matrix.name }}" = "candle" ] || [ "${{ matrix.name }}" = "all" ]; then
            cargo run --features candle --example candle_training
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt -- --check

      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Doc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features
